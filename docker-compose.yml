version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gestar-postgres
    environment:
      POSTGRES_PASSWORD: postgres_admin
    ports:
      - "5432:5432"
    volumes:
      - gestar_db_data:/var/lib/postgresql/data
      - ./src/main/java/br/unibh/gestar/infra/fixtures/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./src/main/java/br/unibh/gestar/infra/fixtures/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gestar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gestar_db_data:
